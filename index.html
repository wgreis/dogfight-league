<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dogfight League Tracker</title>
<style>
  :root{
    --bg:#0f1b14; --panel:#16271c; --panel2:#1d3326; --line:#2c4a37;
    --ink:#eaf3ec; --muted:#9bb6a4; --accent:#3fbf6f; --accent2:#f2c14e;
    --good:#3fbf6f; --bad:#e5736b; --chip:#234032;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);-webkit-text-size-adjust:100%}
  header{background:linear-gradient(135deg,#173d27,#0f1b14);padding:18px 16px;border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:10px;max-width:1100px;margin:0 auto}
  .brand h1{font-size:20px;margin:0;letter-spacing:.5px}
  .brand .tag{color:var(--muted);font-size:12px}
  .flag{font-size:24px}
  nav{display:flex;gap:4px;overflow-x:auto;background:var(--panel);border-bottom:1px solid var(--line);
    position:sticky;top:62px;z-index:19;padding:0 8px}
  nav button{background:none;border:none;color:var(--muted);padding:14px 14px;font-size:14px;font-weight:600;
    cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent}
  nav button.active{color:var(--ink);border-bottom-color:var(--accent)}
  main{max-width:1100px;margin:0 auto;padding:18px 14px 80px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:16px}
  .card h2{margin:0 0 4px;font-size:16px}
  .card .sub{color:var(--muted);font-size:13px;margin-bottom:12px}
  h3{font-size:14px;color:var(--accent);text-transform:uppercase;letter-spacing:.6px;margin:18px 0 8px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.4px}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  tr:last-child td{border-bottom:none}
  .pos{width:34px;color:var(--muted);font-weight:700}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:700}
  .plus{color:var(--good)} .minus{color:var(--bad)}
  .pill.good{background:rgba(63,191,111,.16);color:var(--good)}
  .pill.bad{background:rgba(229,115,107,.16);color:var(--bad)}
  .money{color:var(--accent2);font-weight:700;font-variant-numeric:tabular-nums}
  .muted{color:var(--muted)}
  input,select{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:9px;
    padding:9px 10px;font-size:14px;width:100%}
  input:focus,select:focus{outline:none;border-color:var(--accent)}
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 5px;font-weight:600}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .row > div{flex:1;min-width:120px}
  button.btn{background:var(--accent);color:#07140c;border:none;border-radius:9px;padding:10px 16px;
    font-size:14px;font-weight:700;cursor:pointer}
  button.btn.alt{background:var(--chip);color:var(--ink)}
  button.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
  button.btn.danger{background:transparent;border:1px solid var(--bad);color:var(--bad)}
  button.mini{background:var(--chip);color:var(--ink);border:none;border-radius:7px;padding:5px 9px;
    font-size:12px;font-weight:700;cursor:pointer}
  button.mini.del{background:transparent;border:1px solid var(--bad);color:var(--bad)}
  .grid-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .stat{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px}
  .stat .k{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.4px}
  .stat .v{font-size:24px;font-weight:800;margin-top:4px}
  .stat .v small{font-size:13px;color:var(--muted);font-weight:600}
  .empty{color:var(--muted);text-align:center;padding:30px 10px;font-size:14px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .toolbar .spacer{flex:1}
  details.round{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden}
  details.round>summary{padding:14px 16px;cursor:pointer;font-weight:700;display:flex;justify-content:space-between;
    align-items:center;list-style:none}
  details.round>summary::-webkit-details-marker{display:none}
  details.round>summary .meta{color:var(--muted);font-weight:500;font-size:13px}
  .round-body{padding:0 14px 14px}
  .scoregrid input{padding:7px 6px;text-align:center}
  .hsmall{font-size:11px}
  .note{background:var(--panel2);border-left:3px solid var(--accent);padding:10px 12px;border-radius:0 8px 8px 0;
    color:var(--muted);font-size:13px;margin:10px 0;line-height:1.5}
  .rules p{line-height:1.6;color:#d7e6db}
  .rules li{line-height:1.6;margin-bottom:8px;color:#d7e6db}
  .winner{background:rgba(242,193,78,.10)}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-start;
    justify-content:center;z-index:50;padding:24px 12px;overflow:auto}
  .modal-bg.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;max-width:680px;width:100%;padding:20px}
  .modal h2{margin-top:0}
  .seg{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{background:none;border:none;color:var(--muted);padding:8px 12px;font-weight:700;cursor:pointer;font-size:13px}
  .seg button.on{background:var(--accent);color:#07140c}
  .hide{display:none!important}
  .foot{color:var(--muted);font-size:12px;text-align:center;margin-top:30px;line-height:1.6}
  a{color:var(--accent)}
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="flag">🏌️</span>
    <div>
      <h1 id="leagueName">Dogfight League</h1>
      <div class="tag">Quota points • Weekly purse • Skins • Season standings</div>
    </div>
  </div>
</header>
<nav id="nav"></nav>
<main id="view"></main>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>

<script>
/* ============================ STATE ============================ */
const DEFAULT_SETTINGS = {
  leagueName:"Dogfight League",
  buyIn:20,                 // weekly purse buy-in per player ($)
  skinsBuyIn:5,             // skins buy-in per player ($) — 0 to disable
  skinsType:"gross",        // gross | net  (net subtracts handicap strokes by hole index)
  purseMode:"top3",         // top3 | beatquota | winnertakeall
  quotaCap:36,              // quota = quotaCap - handicap
  seasonPoints:[100,90,80,70,65,60,55,50,45,40,35,30,25,20,15,10,5], // 100-90-80-70 then by 5s; beyond list = lowest
  rollingWindow:0,          // 0 = static 36-HC quota; >0 = avg of last N point totals (when available)
  team1Name:"Team 1",
  team2Name:"Team 2",
  seasonBuyIn:100,          // season-long prize buy-in per player
  rakePct:10               // % of each weekly purse pulled into the season prize pool
};
const PINE_TREE = {
  id:"pinetree", name:"Pine Tree Golf & Country Club", location:"Birmingham, AL", par:72,
  holesPar:[5,3,4,4,4,5,3,4,4, 4,3,4,5,4,5,3,4,4],
  holesSI: [15,11,5,1,7,17,13,9,3, 4,14,8,16,2,10,18,6,12],
  tees:[
    {name:"Black", rating:72.8, slope:133, yards:6704},
    {name:"Grey",  rating:71.5, slope:132, yards:6465},
    {name:"White", rating:70.4, slope:130, yards:6228}
  ]
};
const SEED = {
  settings:{...DEFAULT_SETTINGS},
  players:[],
  rounds:[],
  courses:[ JSON.parse(JSON.stringify(PINE_TREE)) ]
};
let S = JSON.parse(JSON.stringify(SEED));
let activeTab = "dashboard";
let saveTimer=null;

// Load from the server (shared data). Falls back to a local cache if offline.
async function init(){
  try{
    const r = await fetch("/api/data");
    if(r.ok){ const o = await r.json(); if(o && o.players){ o.settings={...DEFAULT_SETTINGS,...o.settings}; S=o; } }
  }catch(e){
    try{ const raw=localStorage.getItem("dogfightLeague"); if(raw){ const o=JSON.parse(raw); o.settings={...DEFAULT_SETTINGS,...o.settings}; S=o; } }catch(_){}
  }
  if(!S.courses || !S.courses.length) S.courses=[JSON.parse(JSON.stringify(PINE_TREE))];
  render();
}
// Save: cache locally immediately, push to server (debounced).
function save(){
  try{ localStorage.setItem("dogfightLeague", JSON.stringify(S)); }catch(e){}
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    fetch("/api/data",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(S)}).catch(()=>{});
  },400);
}
function uid(){ return Math.random().toString(36).slice(2,9); }
function money(n){ return "$"+ (Math.round(n*100)/100).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2}); }
function signed(n){ return (n>0?"+":"") + n; }

/* ============================ QUOTA ============================ */
// Default quota for a player given their handicap (and optional rolling window over prior rounds)
function quotaFor(player, beforeRoundIndex){
  const cap = S.settings.quotaCap;
  const win = S.settings.rollingWindow;
  if(!win) return Math.max(0, cap - Math.round(player.handicap));
  // rolling: average of player's most recent `win` point totals from rounds before this one
  const pts=[];
  const rounds = S.rounds.slice(0, beforeRoundIndex===undefined ? S.rounds.length : beforeRoundIndex);
  for(let i=rounds.length-1;i>=0 && pts.length<win;i--){
    const e = rounds[i].entries.find(x=>x.playerId===player.id && x.points!=null && x.points!=="");
    if(e) pts.push(Number(e.points));
  }
  if(pts.length===0) return Math.max(0, cap - Math.round(player.handicap)); // fallback until data exists
  return Math.round(pts.reduce((a,b)=>a+b,0)/pts.length);
}

/* ---- default quota (9-hole rounds get half) ---- */
function defaultQuota(player, roundIndex, holes, course, tee){
  let base;
  if(course && tee){
    const ch = courseHandicap(player.handicap, course, tee);
    base = Math.max(0, S.settings.quotaCap - (ch!=null ? ch : Math.round(player.handicap)));
  } else {
    base = quotaFor(player, roundIndex);   // fallback: quotaCap - Index
  }
  return holes===9 ? Math.round(base/2) : base;
}
// Auto-set every entry's quota for a round from each player's handicap + the round's tee.
function recalcQuotas(rd){
  const co=getCourse(rd.courseId), tee=getTee(co, rd.tee), nH=Number(rd.holes)||18, idx=S.rounds.indexOf(rd);
  rd.entries.forEach(e=>{ const p=S.players.find(x=>x.id===e.playerId); if(p) e.quota = defaultQuota(p, idx, nH, co, tee); });
}
/* ---- course helpers ---- */
function getCourse(id){ return (S.courses||[]).find(c=>c.id===id); }
function getTee(course,name){ return course && (course.tees||[]).find(t=>t.name===name); }
function courseHandicap(index, course, tee){
  if(course==null||tee==null||index==null||index==="") return null;
  return Math.round(Number(index)*tee.slope/113 + (tee.rating - course.par));
}
function stablefordPts(gross, par){ if(gross==null||gross===""||par==null) return 0; return Math.max(0, 2 - (Number(gross)-par)); }

/* ---- rank scored rows by diff, award season points (ties shared) ---- */
function rankAndAward(scored){
  scored.sort((a,b)=> b.diff - a.diff);
  let pos=0,last=null,seen=0;
  scored.forEach(r=>{ seen++; if(r.diff!==last){ pos=seen; last=r.diff; } r.pos=pos; });
  const table=S.settings.seasonPoints;
  const ptAt=i=> i<table.length ? table[i] : (table.length ? table[table.length-1] : 0);
  const groups={};
  scored.forEach(r=> (groups[r.pos]=groups[r.pos]||[]).push(r));
  Object.keys(groups).forEach(k=>{
    const grp=groups[k]; const startIdx=Number(k)-1;
    let sum=0; for(let i=0;i<grp.length;i++) sum+=ptAt(startIdx+i);
    const each=Math.round((sum/grp.length)*10)/10;
    grp.forEach(r=> r.seasonPts=each);
  });
  return groups;
}
/* ---- a round's combine partner (pairing is symmetric) ---- */
function partnerOf(rd){
  if(rd.pairWith) return rd.pairWith;
  const o=S.rounds.find(r=>r.pairWith===rd.id);
  return o ? o.id : "";
}
/* ---- combine two 9-hole rounds into one 18-hole event ---- */
function combinedEvent(a,b,ia,ib){
  const ca=calcRound(a,ia), cb=calcRound(b,ib);
  const out=[];
  S.players.forEach(p=>{
    const ra=ca.rows.find(x=>x.playerId===p.id && x.hasPts);
    const rb=cb.rows.find(x=>x.playerId===p.id && x.hasPts);
    if(ra&&rb) out.push({playerId:p.id,name:p.name,quota:ra.quota+rb.quota,points:ra.points+rb.points,diff:ra.diff+rb.diff,hasPts:true});
  });
  rankAndAward(out);
  return {combined:true, a, b, rows:out};
}
/* ---- season events: paired nines collapse to a single 18 ---- */
function seasonEvents(){
  const partner={};
  S.rounds.forEach(rd=>{ if(rd.pairWith){ const o=S.rounds.find(r=>r.id===rd.pairWith); if(o){ partner[rd.id]=o.id; partner[o.id]=rd.id; } } });
  const used=new Set(); const events=[];
  S.rounds.forEach((rd,i)=>{
    if(used.has(rd.id)) return;
    const pid=partner[rd.id];
    if(pid && !used.has(pid)){
      const j=S.rounds.findIndex(r=>r.id===pid);
      used.add(rd.id); used.add(pid);
      events.push(combinedEvent(rd, S.rounds[j], i, j));
      return;
    }
    used.add(rd.id);
    events.push({single:true, rows:calcRound(rd,i).rows.filter(r=>r.hasPts)});
  });
  return events;
}

/* ============================ ROUND CALC ============================ */
function calcRound(round, roundIndex){
  const nHoles = Number(round.holes)||18;
  const course = getCourse(round.courseId); const tee = getTee(course, round.tee);
  let rows = round.entries
    .map(e=>{
      const p = S.players.find(x=>x.id===e.playerId);
      if(!p) return null;
      const quota = (e.quota!=null && e.quota!=="") ? Number(e.quota) : defaultQuota(p, roundIndex, nHoles, course, tee);
      const hasPts = e.points!=null && e.points!=="";
      const points = hasPts ? Number(e.points) : null;
      return {
        playerId:p.id, name:p.name, handicap:p.handicap,
        quota, points, hasPts, skinsIn: !!e.skinsIn,
        diff: hasPts ? points - quota : null,
        gross: (e.gross||[]).slice(0,nHoles).map(g=> (g===""||g==null)?null:Number(g))
      };
    }).filter(Boolean);

  // RANK + season points
  const scored = rows.filter(r=>r.hasPts);
  const groups = rankAndAward(scored);

  // PURSE (everyone in the round pays the weekly buy-in; a rake % is pulled to the season prize pool, the rest pays out top finishers)
  const field = scored.length;
  const pot = field * Number(S.settings.buyIn||0);
  const rake = Math.round(pot * (Number(S.settings.rakePct||0)/100) * 100)/100;
  const payoutPot = pot - rake;
  scored.forEach(r=> r.purse=0);
  if(payoutPot>0 && field>0){
    const mode=S.settings.purseMode;
    if(mode==="winnertakeall"){
      const winners=groups[1]||[]; winners.forEach(r=> r.purse = payoutPot/winners.length);
    } else if(mode==="beatquota"){
      const win = scored.filter(r=>r.diff>0);
      if(win.length) win.forEach(r=> r.purse = payoutPot/win.length);
      else { const w=groups[1]||[]; w.forEach(r=> r.purse=payoutPot/w.length); }
    } else { // top3 50/30/20
      const split=[0.5,0.3,0.2];
      [1,2,3].forEach((p,idx)=>{ const g=groups[p]; if(g&&g.length) g.forEach(r=> r.purse += payoutPot*split[idx]/g.length); });
      const paid=scored.reduce((a,r)=>a+r.purse,0);
      if(paid < payoutPot-0.001){ const w=groups[1]||[]; const left=payoutPot-paid; w.forEach(r=> r.purse += left/w.length); }
    }
  }

  // SKINS (opt-in $ game: only opted-in players pay and can win; ties carry over; net optional)
  const skinsBuyIn=Number(S.settings.skinsBuyIn||0);
  const optedIn = rows.filter(r=> r.skinsIn);
  const withGross = optedIn.filter(r=> r.gross.length===nHoles && r.gross.every(g=>g!=null));
  let skinsDetail=[]; let skinsPot=0;
  rows.forEach(r=> r.skinsWon=0);
  if(skinsBuyIn>0 && withGross.length>=2){
    skinsPot = optedIn.length * skinsBuyIn;
    let carry=0;
    for(let h=0;h<nHoles;h++){
      // net: subtract a stroke on holes where index <= playerStrokes. We approximate stroke index = hole order?
      // Use simple net: strokes spread across hardest holes by handicap; we use hole number ordering as index 1..18.
      const vals = withGross.map(r=>{
        let g = r.gross[h];
        if(S.settings.skinsType==="net"){
          const ch = courseHandicap(r.handicap, course, tee);
          const hc = Math.round(ch!=null ? ch : (nHoles===9 ? r.handicap/2 : r.handicap));
          let strokesThisHole;
          if(course && course.holesSI){ const base=Math.floor(hc/18), extra=((hc%18)+18)%18; strokesThisHole = base + (course.holesSI[h] <= extra ? 1 : 0); }
          else { strokesThisHole = Math.floor(hc/nHoles) + ((h < (hc%nHoles))?1:0); }
          g = g - strokesThisHole;
        }
        return {r, g};
      });
      const min = Math.min(...vals.map(v=>v.g));
      const low = vals.filter(v=>v.g===min);
      if(low.length===1){
        const skins = 1+carry; low[0].r.skinsWon += skins;
        skinsDetail.push({hole:h+1, winner:low[0].r.name, score:min, skins});
        carry=0;
      } else { carry++; skinsDetail.push({hole:h+1, winner:"— tie (carry)", score:min, skins:0}); }
    }
    const totalSkins = withGross.reduce((a,r)=>a+r.skinsWon,0);
    const per = totalSkins>0 ? skinsPot/totalSkins : 0;
    rows.forEach(r=> r.skinsMoney = (r.skinsWon||0)*per);
  } else {
    rows.forEach(r=> r.skinsMoney=0);
  }

  // merge unscored rows back for display, then sort: scored by pos, then unscored
  const byId={}; rows.forEach(r=> byId[r.playerId]=r);
  scored.forEach(r=> Object.assign(byId[r.playerId], r));
  const ordered = [...scored, ...rows.filter(r=>!r.hasPts)];
  return {rows:ordered, pot, rake, payoutPot, optedIn:optedIn.length, skinsPot, skinsDetail, field, perSkin: (skinsPot && ordered.reduce((a,r)=>a+(r.skinsWon||0),0))? skinsPot/ordered.reduce((a,r)=>a+(r.skinsWon||0),0):0};
}

/* ============================ SEASON CALC ============================ */
function calcSeason(){
  const agg={};
  S.players.forEach(p=> agg[p.id]={playerId:p.id,name:p.name,handicap:p.handicap,team:p.team||1,
    rounds:0,seasonPts:0,totalDiff:0,best:null,wins:0,purse:0,skins:0});
  // money settles per round (each nine is its own game)
  S.rounds.forEach((rd,i)=>{ const c=calcRound(rd,i); c.rows.forEach(r=>{ if(!r.hasPts) return; const a=agg[r.playerId]; if(a){ a.purse+=r.purse||0; a.skins+=r.skinsMoney||0; } }); });
  // standings settle per event (two linked nines = one 18)
  seasonEvents().forEach(ev=>{ ev.rows.forEach(r=>{ const a=agg[r.playerId]; if(!a) return; a.rounds++; a.seasonPts+=r.seasonPts||0; a.totalDiff+=r.diff; a.best=a.best==null?r.diff:Math.max(a.best,r.diff); if(r.pos===1) a.wins++; }); });
  const arr=Object.values(agg).map(a=>({...a, money:a.purse+a.skins,
    avgDiff: a.rounds? Math.round(a.totalDiff/a.rounds*10)/10 : 0}));
  arr.sort((x,y)=> y.seasonPts-x.seasonPts || y.totalDiff-x.totalDiff || y.wins-x.wins);
  let pos=0,last=null,seen=0;
  arr.forEach(a=>{ seen++; if(a.seasonPts!==last){pos=seen;last=a.seasonPts;} a.pos=a.rounds?pos:"—"; });
  return arr;
}

/* ============================ RENDER ============================ */
const TABS=[["dashboard","Standings"],["rounds","Rounds & Scores"],["skins","Skins"],["players","Players"],["settings","Settings"],["rules","How It Works"]];
function renderNav(){
  document.getElementById("nav").innerHTML = TABS.map(([id,label])=>
    `<button class="${activeTab===id?'active':''}" onclick="go('${id}')">${label}</button>`).join("");
  document.getElementById("leagueName").textContent = S.settings.leagueName;
  document.title = S.settings.leagueName;
}
function go(tab){ activeTab=tab; render(); window.scrollTo(0,0); }
function render(){
  renderNav();
  const v=document.getElementById("view");
  if(activeTab==="dashboard") v.innerHTML=viewDashboard();
  else if(activeTab==="rounds") v.innerHTML=viewRounds();
  else if(activeTab==="skins") v.innerHTML=viewSkins();
  else if(activeTab==="players") v.innerHTML=viewPlayers();
  else if(activeTab==="settings") v.innerHTML=viewSettings();
  else if(activeTab==="rules") v.innerHTML=viewRules();
}

/* ---------- Season prize pool ---------- */
function seasonPrizePool(){
  const buyins = Number(S.settings.seasonBuyIn||0) * S.players.length;
  let rake=0; S.rounds.forEach((rd,i)=>{ rake += (calcRound(rd,i).rake||0); });
  rake=Math.round(rake*100)/100;
  return { buyins, rake, total: Math.round((buyins+rake)*100)/100 };
}
function prizePoolCard(){
  const pp=seasonPrizePool();
  return `<div class="card"><h2>Season Prize Pool</h2><div class="sub">${money(S.settings.seasonBuyIn)} season buy-in per player + ${S.settings.rakePct}% weekly purse rake</div>
    <div class="grid-stats">
      <div class="stat" style="border-color:var(--accent2)"><div class="k">Total Pool</div><div class="v money">${money(pp.total)}</div></div>
      <div class="stat"><div class="k">Season Buy-ins</div><div class="v">${money(pp.buyins)} <small>${S.players.length}×${money(S.settings.seasonBuyIn)}</small></div></div>
      <div class="stat"><div class="k">Weekly Rake</div><div class="v money">${money(pp.rake)}</div></div>
    </div></div>`;
}

/* ---------- Team battle (season-long Team 1 vs Team 2) ---------- */
function teamBattleCard(season){
  const t={1:{name:S.settings.team1Name||'Team 1',pts:0,diff:0,money:0,n:0},
           2:{name:S.settings.team2Name||'Team 2',pts:0,diff:0,money:0,n:0}};
  season.forEach(s=>{ const k=s.team===2?2:1; t[k].pts+=s.seasonPts; t[k].diff+=s.totalDiff; t[k].money+=s.money; t[k].n++; });
  const a=t[1], b=t[2], total=a.pts+b.pts, r=v=>Math.round(v*10)/10;
  const aPct= total? Math.round(a.pts/total*100):50;
  const lead = a.pts>b.pts? a.name+' leading' : (b.pts>a.pts? b.name+' leading' : 'All square');
  return `<div class="card"><h2>Season Team Battle</h2><div class="sub">${lead} &bull; season-long points</div>
    <div style="display:flex;gap:14px;margin:8px 0 12px">
      <div class="stat" style="flex:1;${a.pts>=b.pts && total?'border-color:var(--accent)':''}"><div class="k">${a.name} <span class="hsmall">(${a.n})</span></div><div class="v">${r(a.pts)} <small>pts</small></div><div class="hsmall muted">${signed(r(a.diff))} +/- &bull; ${money(a.money)}</div></div>
      <div class="stat" style="flex:1;${b.pts>a.pts?'border-color:var(--accent)':''}"><div class="k">${b.name} <span class="hsmall">(${b.n})</span></div><div class="v">${r(b.pts)} <small>pts</small></div><div class="hsmall muted">${signed(r(b.diff))} +/- &bull; ${money(b.money)}</div></div>
    </div>
    <div style="height:14px;border-radius:8px;overflow:hidden;display:flex;background:var(--panel2);border:1px solid var(--line)">
      <div style="width:${aPct}%;background:var(--accent)"></div><div style="flex:1;background:var(--accent2)"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:4px" class="hsmall muted"><span>${a.name} ${aPct}%</span><span>${b.name} ${100-aPct}%</span></div>
  </div>`;
}

/* ---------- Dashboard / Season standings ---------- */
function viewDashboard(){
  const season=calcSeason();
  const played=season.filter(s=>s.rounds>0);
  const totalPot = S.rounds.reduce((a,rd,i)=> a+calcRound(rd,i).pot+calcRound(rd,i).skinsPot,0);
  const leader = played[0];
  let html=teamBattleCard(season)+prizePoolCard()+`<div class="card"><h2>Season Standings</h2>
    <div class="sub">${S.rounds.length} round${S.rounds.length!==1?'s':''} played • ${S.players.length} players • ${money(totalPot)} put in play</div>
    <div class="grid-stats">
      <div class="stat"><div class="k">Current Leader</div><div class="v">${leader?leader.name:"—"}</div></div>
      <div class="stat"><div class="k">Leader's Pts</div><div class="v">${leader?leader.seasonPts:"—"} <small>season pts</small></div></div>
      <div class="stat"><div class="k">Rounds Played</div><div class="v">${S.rounds.length}</div></div>
      <div class="stat"><div class="k">Money in Play</div><div class="v money">${money(totalPot)}</div></div>
    </div></div>`;

  if(played.length===0){
    html+=`<div class="card"><div class="empty">No scores yet. Add players, then create a round under <b>Rounds &amp; Scores</b>.<br><br>
      <button class="btn" onclick="go('players')">Add Players</button></div></div>`;
    return html;
  }
  html+=`<div class="card"><h2>Leaderboard</h2><div class="sub">Ranked by season points. Tiebreak: total +/- vs quota, then wins.</div>
    <table><thead><tr><th class="pos">#</th><th>Player</th><th class="num">Rnds</th>
    <th class="num">Season Pts</th><th class="num">Total +/-</th><th class="num">Avg</th>
    <th class="num">Wins</th><th class="num">$ Won</th></tr></thead><tbody>`;
  season.forEach(s=>{
    const dim = s.rounds? "" : "style='opacity:.45'";
    html+=`<tr ${dim} ${s.pos===1?'class="winner"':''}>
      <td class="pos">${s.pos}</td><td><b>${s.name}</b> <span class="muted hsmall">(${s.handicap}) · ${(s.team===2?(S.settings.team2Name||'Team 2'):(S.settings.team1Name||'Team 1'))}</span></td>
      <td class="num">${s.rounds}</td>
      <td class="num"><b>${s.seasonPts}</b></td>
      <td class="num ${s.totalDiff>=0?'plus':'minus'}">${signed(s.totalDiff)}</td>
      <td class="num">${s.rounds?signed(s.avgDiff):'—'}</td>
      <td class="num">${s.wins}</td>
      <td class="num money">${money(s.money)}</td></tr>`;
  });
  html+=`</tbody></table>
    <div class="note">Season points are awarded by finish position each round (default 10-8-6-5-4-3-2-1, then 1 for everyone else). Change the schedule in <b>Settings</b>.</div></div>`;

  // last round recap
  if(S.rounds.length){
    const i=S.rounds.length-1; const rd=S.rounds[i]; const c=calcRound(rd,i);
    html+=`<div class="card"><h2>Latest Round — ${rd.date||'Round '+(i+1)}</h2><div class="sub">${rd.course||''}</div>`;
    html+=roundResultTable(c);
    html+=`</div>`;
  }
  return html;
}

function combinedTable(ev){
  if(!ev.rows.length) return `<div class="empty">Both nines need points from the same players to form an 18.</div>`;
  let h=`<table><thead><tr><th class="pos">#</th><th>Player</th><th class="num">Quota</th><th class="num">Points</th><th class="num">+/-</th><th class="num">Season Pts</th></tr></thead><tbody>`;
  ev.rows.forEach(r=> h+=`<tr ${r.pos===1?'class="winner"':''}><td class="pos">${r.pos}</td><td><b>${r.name}</b></td><td class="num">${r.quota}</td><td class="num">${r.points}</td><td class="num ${r.diff>=0?'plus':'minus'}"><b>${signed(r.diff)}</b></td><td class="num">${r.seasonPts}</td></tr>`);
  h+=`</tbody></table><div class="note">This combined 18 is what counts in the season standings &mdash; the two nines don't also count separately for season points. Purse &amp; skins still settle per nine above.</div>`;
  return h;
}
function roundResultTable(c){
  if(!c.rows.some(r=>r.hasPts)) return `<div class="empty">No scores entered for this round yet.</div>`;
  let h=`<table><thead><tr><th class="pos">#</th><th>Player</th><th class="num">Quota</th>
    <th class="num">Points</th><th class="num">+/-</th><th class="num">Pts</th>`;
  if(c.skinsPot>0) h+=`<th class="num">Skins</th>`;
  h+=`<th class="num">$ Won</th></tr></thead><tbody>`;
  c.rows.forEach(r=>{
    if(!r.hasPts){ h+=`<tr style="opacity:.4"><td class="pos">—</td><td>${r.name}</td><td class="num">${r.quota}</td><td class="num">—</td><td class="num">—</td><td class="num">—</td>${c.skinsPot>0?'<td class="num">—</td>':''}<td class="num">—</td></tr>`; return; }
    const tot=(r.purse||0)+(r.skinsMoney||0);
    h+=`<tr ${r.pos===1?'class="winner"':''}><td class="pos">${r.pos}</td><td><b>${r.name}</b></td>
      <td class="num">${r.quota}</td><td class="num">${r.points}</td>
      <td class="num ${r.diff>=0?'plus':'minus'}"><b>${signed(r.diff)}</b></td>
      <td class="num">${r.seasonPts}</td>`;
    if(c.skinsPot>0) h+=`<td class="num">${r.skinsWon||0}</td>`;
    h+=`<td class="num money">${tot>0?money(tot):'—'}</td></tr>`;
  });
  h+=`</tbody></table>`;
  let foot=[];
  if(c.pot>0) foot.push(`Purse ${money(c.pot)} → ${money(c.payoutPot)} paid${c.rake>0?` · ${money(c.rake)} to season pool`:''}`);
  if(c.skinsPot>0) foot.push(`Skins pot ${money(c.skinsPot)} (${money(c.perSkin)}/skin)`);
  if(foot.length) h+=`<div class="note">${foot.join(' &nbsp;•&nbsp; ')}</div>`;
  return h;
}

/* ---------- Rounds & score entry ---------- */
function viewRounds(){
  let html=`<div class="card"><div class="toolbar">
    <button class="btn" onclick="newRound()">+ New Round</button>
    <div class="spacer"></div></div>`;
  if(S.players.length===0){ html+=`<div class="empty">Add players first.</div></div>`; return html; }
  if(S.rounds.length===0){ html+=`<div class="empty">No rounds yet. Click <b>New Round</b> to start.</div></div>`; return html; }
  html+=`</div>`;
  // newest first
  S.rounds.map((rd,i)=>[rd,i]).reverse().forEach(([rd,i])=>{
    const c=calcRound(rd,i);
    const scoredN=c.rows.filter(r=>r.hasPts).length;
    html+=`<details class="round" ${i===S.rounds.length-1?'open':''}>
      <summary><span>${rd.date||'Round '+(i+1)} <span class="meta">${(Number(rd.holes)||18)===9?'9-hole'+(partnerOf(rd)?' · paired':''):'18-hole'}${rd.course?' · '+rd.course:''}</span></span>
      <span class="meta">${scoredN}/${rd.entries.length} scored</span></summary>
      <div class="round-body">${roundEditor(rd,i,c)}</div></details>`;
  });
  return html;
}

function roundEditor(rd,i,c){
  const mode = rd.entryMode||"points"; // points | holes
  const nHoles = Number(rd.holes)||18;
  const partner = partnerOf(rd);
  const rc = getCourse(rd.courseId); const rtee = getTee(rc, rd.tee);
  let h=`<div class="row" style="margin-top:12px">
    <div><label>Date</label><input type="date" value="${rd.date||''}" onchange="updRound('${rd.id}','date',this.value)"></div>
    <div><label>Course</label><select onchange="setRoundCourse('${rd.id}',this.value)"><option value="">— other / none —</option>${(S.courses||[]).map(co=>`<option value="${co.id}" ${rd.courseId===co.id?'selected':''}>${co.name}</option>`).join('')}</select></div>
    ${rc?`<div style="flex:0 0 auto"><label>Tees</label><select onchange="updRound('${rd.id}','tee',this.value)">${(rc.tees||[]).map(t=>`<option value="${t.name}" ${rd.tee===t.name?'selected':''}>${t.name} ${t.rating}/${t.slope}</option>`).join('')}</select></div>`:''}
    <div style="flex:0 0 auto"><label>Holes</label>
      <div class="seg"><button class="${nHoles===18?'on':''}" onclick="updRound('${rd.id}','holes',18)">18</button>
      <button class="${nHoles===9?'on':''}" onclick="updRound('${rd.id}','holes',9)">9</button></div></div>
    <div style="flex:0 0 auto"><label>Entry mode</label>
      <div class="seg"><button class="${mode==='points'?'on':''}" onclick="updRound('${rd.id}','entryMode','points')">Points</button>
      <button class="${mode==='holes'?'on':''}" onclick="updRound('${rd.id}','entryMode','holes')">Hole-by-hole</button></div></div>
  </div>`;
  if(nHoles===9){
    const others=S.rounds.filter(r=>r.id!==rd.id && (Number(r.holes)||18)===9);
    h+=`<div class="row" style="margin-top:10px"><div><label>Combine with another 9 (forms an 18 for standings)</label>
      <select onchange="updRound('${rd.id}','pairWith',this.value)">
      <option value="">&mdash; none &mdash;</option>
      ${others.map(o=>`<option value="${o.id}" ${rd.pairWith===o.id?'selected':''}>${o.date||'Round'}${o.course?' · '+o.course:''}</option>`).join('')}
      </select></div></div>`;
  }
  const quotaDesc = (rc && rtee) ? `${S.settings.quotaCap} − Course Handicap (Index adjusted for the ${rd.tee} tee, ${rtee.rating}/${rtee.slope})` : `${S.settings.quotaCap} − Index`;
  h+=`<div class="note">Quota = ${nHoles===9?'½ × ('+quotaDesc+')':quotaDesc} — auto-calculated from each player's handicap and the selected tee, and recalculated when you change the tee. Editable per round.${nHoles===9?' <b>9-hole</b> round (half quota).':''} ${mode==='holes'?'Hole-by-hole gross scores feed the skins game.':'Switch to <b>Hole-by-hole</b> to also run skins.'}</div>`;
  if(rc) h+=`<div class="note">${rc.name}${rd.tee?` · <b>${rd.tee}</b> tee`:''}${rtee?` · rating ${rtee.rating} / slope ${rtee.slope} · ${rtee.yards} yds`:''} · par ${rc.par}. Pars &amp; stroke index show on the hole grid; in Hole-by-hole you can auto-fill points from scores.</div>`;
  if(Number(S.settings.skinsBuyIn||0)>0){
    const inC=rd.entries.filter(e=>e.skinsIn).length;
    h+=`<h3>Skins opt-in &mdash; $${S.settings.skinsBuyIn} each &middot; ${inC} in &middot; ${money(inC*Number(S.settings.skinsBuyIn))} pot</h3><div class="row" style="gap:6px;margin-bottom:6px">`;
    rd.entries.forEach(e=>{ const p=S.players.find(x=>x.id===e.playerId); if(!p) return;
      h+=`<label style="flex:0 0 auto;display:flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid ${e.skinsIn?'var(--accent)':'var(--line)'};border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer"><input type="checkbox" style="width:auto" ${e.skinsIn?'checked':''} onchange="toggleSkins('${rd.id}','${p.id}',this.checked)"> ${p.name}</label>`; });
    h+=`</div>`;
  }

  if(mode==="points"){
    h+=`<table><thead><tr><th>Player</th><th class="num">Quota</th><th class="num">Points</th><th class="num">+/-</th></tr></thead><tbody>`;
    rd.entries.forEach(e=>{
      const r=c.rows.find(x=>x.playerId===e.playerId)||{};
      h+=`<tr><td>${r.name||''}</td>
        <td class="num" style="max-width:80px"><input type="number" value="${e.quota??r.quota??''}" onchange="updEntry('${rd.id}','${e.playerId}','quota',this.value)"></td>
        <td class="num" style="max-width:80px"><input type="number" value="${e.points??''}" onchange="updEntry('${rd.id}','${e.playerId}','points',this.value)"></td>
        <td class="num ${r.diff>=0?'plus':'minus'}">${r.hasPts?signed(r.diff):'—'}</td></tr>`;
    });
    h+=`</tbody></table>`;
  } else {
    h+=`<div style="overflow-x:auto"><table class="scoregrid"><thead><tr><th>Player</th>`;
    for(let n=1;n<=nHoles;n++) h+=`<th class="num hsmall">${n}</th>`;
    h+=`<th class="num">Gross</th><th class="num">Pts</th><th class="num">Quota</th><th class="num">+/-</th></tr></thead><tbody>`;
    if(rc){ h+=`<tr style="color:var(--muted)"><td class="hsmall">Par</td>`; for(let n=0;n<nHoles;n++) h+=`<td class="num hsmall">${rc.holesPar[n]}</td>`; h+=`<td></td><td></td><td></td><td></td></tr>`;
            h+=`<tr style="color:var(--muted)"><td class="hsmall">SI</td>`; for(let n=0;n<nHoles;n++) h+=`<td class="num hsmall">${rc.holesSI[n]}</td>`; h+=`<td></td><td></td><td></td><td></td></tr>`; }
    rd.entries.forEach(e=>{
      const r=c.rows.find(x=>x.playerId===e.playerId)||{};
      const g=e.gross||Array(nHoles).fill("");
      const gross=g.slice(0,nHoles).reduce((a,x)=>a+(x?Number(x):0),0);
      h+=`<tr><td style="white-space:nowrap">${r.name||''}</td>`;
      for(let n=0;n<nHoles;n++) h+=`<td style="max-width:40px"><input style="width:38px" type="number" value="${g[n]??''}" onchange="updGross('${rd.id}','${e.playerId}',${n},this.value)"></td>`;
      h+=`<td class="num">${gross||'—'}</td>
        <td class="num" style="max-width:70px"><input type="number" value="${e.points??''}" onchange="updEntry('${rd.id}','${e.playerId}','points',this.value)"></td>
        <td class="num" style="max-width:70px"><input type="number" value="${e.quota??r.quota??''}" onchange="updEntry('${rd.id}','${e.playerId}','quota',this.value)"></td>
        <td class="num ${r.diff>=0?'plus':'minus'}">${r.hasPts?signed(r.diff):'—'}</td></tr>`;
    });
    h+=`</tbody></table></div>`;
    if(rc) h+=`<div class="toolbar" style="margin-top:8px"><button class="mini" onclick="fillPoints('${rd.id}')">⚑ Auto-fill points from scores (gross Stableford)</button></div>`;
  }
  h+=`<h3>Results</h3>${roundResultTable(c)}`;
  if(partner){ const other=S.rounds.find(r=>r.id===partner); if(other){ const ev=combinedEvent(rd, other, S.rounds.indexOf(rd), S.rounds.indexOf(other)); h+=`<h3>Combined 18 &mdash; with ${other.date||'paired nine'}${other.course?' ('+other.course+')':''}</h3>`+combinedTable(ev); } }
  h+=`<div class="toolbar" style="margin-top:14px"><div class="spacer"></div>
    <button class="btn danger" onclick="delRound('${rd.id}')">Delete round</button></div>`;
  return h;
}

/* ---------- Skins detail ---------- */
function viewSkins(){
  if(S.settings.skinsBuyIn<=0) return `<div class="card"><h2>Skins</h2><div class="empty">Skins are turned off. Set a skins buy-in in <b>Settings</b> to enable.</div></div>`;
  let html=`<div class="card"><h2>Skins Game</h2><div class="sub">${S.settings.skinsType==='net'?'Net':'Gross'} skins • ${money(S.settings.skinsBuyIn)} buy-in per player • low score on a hole wins; ties carry over.</div></div>`;
  const rounds=S.rounds.map((rd,i)=>[rd,i]).reverse().filter(([rd,i])=>calcRound(rd,i).skinsPot>0);
  if(rounds.length===0) return html+`<div class="card"><div class="empty">No hole-by-hole scores entered yet. In <b>Rounds &amp; Scores</b>, switch a round to <b>Hole-by-hole</b> entry.</div></div>`;
  rounds.forEach(([rd,i])=>{
    const c=calcRound(rd,i);
    html+=`<div class="card"><h2>${rd.date||'Round '+(i+1)}</h2>
      <div class="sub">Pot ${money(c.skinsPot)} • ${money(c.perSkin)} per skin</div>`;
    // winners summary
    const winners=c.rows.filter(r=>r.skinsWon>0).sort((a,b)=>b.skinsWon-a.skinsWon);
    html+=`<table><thead><tr><th>Player</th><th class="num">Skins</th><th class="num">$</th></tr></thead><tbody>`;
    winners.forEach(r=> html+=`<tr><td>${r.name}</td><td class="num">${r.skinsWon}</td><td class="num money">${money(r.skinsMoney)}</td></tr>`);
    if(!winners.length) html+=`<tr><td colspan="3" class="empty">All holes tied — full carryover (no skins won).</td></tr>`;
    html+=`</tbody></table>`;
    // hole detail
    html+=`<h3>Hole-by-hole</h3><div style="overflow-x:auto"><table><thead><tr><th>Hole</th>${c.skinsDetail.map(d=>`<th class="num hsmall">${d.hole}</th>`).join('')}</tr></thead><tbody>
      <tr><td>Won by</td>${c.skinsDetail.map(d=>`<td class="num hsmall">${d.skins>0?d.winner.split(' ')[0]+' ('+d.skins+')':'—'}</td>`).join('')}</tr>
      </tbody></table></div></div>`;
  });
  return html;
}

    <div class="row"><div><label>Rolling average window (0 = static 36−HC)</label>

      <div><label>&nbsp;</label><div class="note" style="margin:0">Set to e.g. 5 to make each quota the average of a player's last 5 point totals once that many rounds exist (classic self-adjusting dogfight). Leave 0 to keep 36−handicap.</div></div>
    </div>
    <h3>Weekly purse</h3>
    <div class="row">
      <div><label>Buy-in per player ($)</label><input type="number" value="${s.buyIn}" onchange="updSetting('buyIn',this.value)"></div>
      <div><label>Payout</label><select onchange="updSetting('purseMode',this.value)">
        <option value="top3" ${s.purseMode==='top3'?'selected':''}>Top 3 split 50/30/20</option>
        <option value="beatquota" ${s.purseMode==='beatquota'?'selected':''}>Everyone who beats quota splits evenly</option>
        <option value="winnertakeall" ${s.purseMode==='winnertakeall'?'selected':''}>Winner takes all</option>
      </select></div>
    </div>
    <h3>Season prize pool</h3>
    <div class="row">
      <div><label>Season buy-in per player ($)</label><input type="number" value="${s.seasonBuyIn}" onchange="updSetting('seasonBuyIn',this.value)"></div>
      <div><label>Weekly rake from purse (%)</label><input type="number" value="${s.rakePct}" onchange="updSetting('rakePct',this.value)"></div>
    </div>
    <h3>Skins</h3>
    <div class="row">
      <div><label>Skins buy-in per player ($, 0 = off)</label><input type="number" value="${s.skinsBuyIn}" onchange="updSetting('skinsBuyIn',this.value)"></div>
      <div><label>Type</label><select onchange="updSetting('skinsType',this.value)">
        <option value="gross" ${s.skinsType==='gross'?'selected':''}>Gross</option>
        <option value="net" ${s.skinsType==='net'?'selected':''}>Net (handicap strokes)</option>
      </select></div>
    </div>
    <h3>Season points by finish</h3>
    <div class="row"><div style="flex:3"><label>Points for 1st, 2nd, 3rd… (comma separated; places beyond the list get the last value)</label>
      <input value="${s.seasonPoints.join(', ')}" onchange="updSeasonPoints(this.value)"></div></div>
    <div class="card" style="background:var(--panel2);margin-top:18px">
      <h3 style="margin-top:0">Data</h3>
      <div class="toolbar">
        <button class="btn alt" onclick="loadSample()">Load sample data</button>
        <button class="btn ghost" onclick="exportData()">Export backup (.json)</button>
        <button class="btn ghost" onclick="document.getElementById('imp').click()">Import backup</button>
        <input id="imp" type="file" accept="application/json" class="hide" onchange="importData(this)">
        <button class="btn danger" onclick="wipe()">Erase everything</button>
      </div>
      <div class="note">All data is saved in this browser only (localStorage). Use Export to keep a backup or move it to another device. Bookmark this page to find it again.</div>
    </div>
  </div>`;
}

/* ---------- Rules ---------- */
function viewRules(){
  return `<div class="card rules"><h2>How a Dogfight Works</h2>
  <p>A <b>dogfight</b> is a quota-based points game that lets golfers of very different skill levels compete head to head and fairly. Instead of lowest score wins, every player has a personal <b>quota</b> — a target number of points — and you compete on how far you <i>beat your own quota</i>.</p>

  <h3>1. Points (Stableford)</h3>
  <p>You earn points on each hole based on your score. The standard scale relative to par:</p>
  <ul>
    <li>Double bogey or worse = <b>0</b></li>
    <li>Bogey = <b>1</b></li>
    <li>Par = <b>2</b></li>
    <li>Birdie = <b>3</b></li>
    <li>Eagle = <b>4</b>, Albatross = <b>5</b></li>
  </ul>
  <p>Add them up for your round total. (Many groups play this <i>net</i> — applying handicap strokes hole-by-hole — but with the 36−handicap quota below, gross points work cleanly. Whatever your group agrees on, you just enter the points total.)</p>

  <h3>2. Quota</h3>
  <p>This league sets <b>Quota = ${S.settings.quotaCap} − handicap</b>. A 14-handicap has a quota of ${S.settings.quotaCap-14}; a 4-handicap has a quota of ${S.settings.quotaCap-4}. The lower the handicap, the higher the bar.</p>

  <h3>3. The result (+/-)</h3>
  <p>Your round score is <b>points − quota</b>. Beat your quota by the most and you win the round. Example: quota 22, you post 26 points → <b>+4</b>. Whoever has the highest +/- wins.</p>
  <p class="muted">Tip: many dogfights eventually switch the quota to a <b>rolling average</b> of your recent rounds, so it self-corrects — play well and your quota rises, making it harder next time; slump and it drops. You can switch this on in Settings once you have a few rounds logged.</p>

  <h3>4. The money (three games at once)</h3>
  <ul>
    <li><b>Weekly purse:</b> everyone in the round buys in (currently ${money(S.settings.buyIn)}). ${S.settings.rakePct>0?`${S.settings.rakePct}% is pulled into the season prize pool; the rest`:'The pot'} pays out by finish vs. quota — currently <b>${s_purseLabel()}</b>.</li>
    <li><b>Skins:</b> a separate <b>opt-in</b> game (currently ${S.settings.skinsBuyIn>0?money(S.settings.skinsBuyIn)+' buy-in':'off'}). Only players who opt in that round pay in and can win — if you don't opt in, you can't win a skin. Low score on a hole wins it; ties carry to the next hole; the pot splits evenly across all skins won.</li>
    <li><b>Season points:</b> each round awards points by finish position (${S.settings.seasonPoints.join('-')}…, then 1). These accumulate all season for the overall individual title.</li>
    <li><b>Team battle:</b> every player is on <b>${S.settings.team1Name||'Team 1'}</b> or <b>${S.settings.team2Name||'Team 2'}</b>. Those same season points also sum by team into a season-long Team vs Team battle, shown at the top of the Standings page. Set each player's team on the Players tab.</li>
    <li><b>Season prize pool:</b> a ${money(S.settings.seasonBuyIn)} buy-in per player at season start, plus ${S.settings.rakePct}% of every weekly purse, builds one big end-of-season pot (shown on the Standings page).</li>
  </ul>

  <h3>Playing 9 holes &amp; combining nines</h3>
  <p>Set any round to <b>9 holes</b> and quotas automatically halve (a 14-handicap's 9-hole quota becomes about ${Math.round((S.settings.quotaCap-14)/2)}). Points, +/-, purse, and skins all work the same over 9. If you play two nines you want scored as one 18, open one of them and choose the other under <b>Combine with</b> &mdash; the app sums both nines into a combined 18 that counts as a single event in the season standings. Each nine still settles its own purse and skins.</p>

  <h3>5. Running a round day-of</h3>
  <ul>
    <li>Collect buy-ins. Confirm everyone's quota (auto-shown on the Players tab).</li>
    <li>Play. Track points; if you want skins, keep each player's hole-by-hole gross.</li>
    <li>After the round, open <b>Rounds &amp; Scores</b>, create the round, and enter points (and hole scores for skins).</li>
    <li>The app ranks everyone, splits the purse and skins, and updates the season standings automatically.</li>
  </ul>
  <div class="note">Everything you enter is calculated live and saved in this browser. Share the standings by exporting, or just pass the device around.</div>
  </div>`;
}
function s_purseLabel(){
  return {top3:"Top 3 split 50/30/20", beatquota:"Everyone who beats quota splits evenly", winnertakeall:"Winner takes all"}[S.settings.purseMode];
}

/* ============================ ACTIONS ============================ */
function addPlayer(){
  const name=document.getElementById("pName").value.trim();
  const ghin=document.getElementById("pGhin").value.trim();
  const hcp=parseFloat(document.getElementById("pHcp").value);
  if(!name){ alert("Enter a name"); return; }
  S.players.push({id:uid(),name,ghin,team:Number((document.getElementById('pTeam')||{}).value)||1,handicap:isNaN(hcp)?18:hcp});
  // add entry slot to existing rounds
  S.rounds.forEach(rd=> rd.entries.push({playerId:S.players[S.players.length-1].id,points:"",quota:"",gross:Array(18).fill("")}));
  save(); render();
}
function updPlayer(id,f,v){ const p=S.players.find(x=>x.id===id); if(!p)return; p[f]= f==='handicap'?(parseFloat(v)||0):(f==='team'?Number(v):v); save(); render(); }
function delPlayer(id){ if(!confirm("Remove this player and their scores?"))return;
  S.players=S.players.filter(p=>p.id!==id);
  S.rounds.forEach(rd=> rd.entries=rd.entries.filter(e=>e.playerId!==id)); save(); render(); }

function newRound(){
  const today=new Date().toISOString().slice(0,10);
  const co = S.courses && S.courses[0];
  const teeName = co ? ((co.tees.find(t=>t.name==="White")||co.tees[0]||{}).name||"") : "";
  const rd={id:uid(),date:today,course:co?co.name:"",courseId:co?co.id:"",tee:teeName,holes:18,pairWith:"",entryMode:"points",
    entries:S.players.map(p=>({playerId:p.id,points:"",quota:"",gross:Array(18).fill("")}))};
  S.rounds.push(rd);
  recalcQuotas(rd);   // auto-calc quotas from handicap + tee on creation
  save(); go('rounds');
}
function updRound(id,f,v){ const rd=S.rounds.find(x=>x.id===id); if(!rd)return; rd[f]=v; if(f==='tee'||f==='holes') recalcQuotas(rd); save(); render(); }
function setRoundCourse(rid,cid){ const rd=S.rounds.find(x=>x.id===rid); if(!rd)return; rd.courseId=cid||""; const co=getCourse(cid); rd.course=co?co.name:""; if(co && !getTee(co,rd.tee)) rd.tee=co.tees[0]?co.tees[0].name:""; recalcQuotas(rd); save(); render(); }
function fillPoints(rid){ const rd=S.rounds.find(x=>x.id===rid); if(!rd)return; const co=getCourse(rd.courseId); if(!co){ alert("Pick a course first."); return; } const nH=Number(rd.holes)||18; let filled=0; rd.entries.forEach(e=>{ const g=e.gross||[]; if(g.slice(0,nH).some(x=>x===""||x==null)) return; let pts=0; for(let hh=0;hh<nH;hh++) pts+=stablefordPts(g[hh], co.holesPar[hh]); e.points=pts; filled++; }); save(); render(); alert(filled?`Filled gross Stableford points for ${filled} player(s).`:"No players have a full set of hole scores yet."); }
function delRound(id){ if(!confirm("Delete this round?"))return; S.rounds=S.rounds.filter(r=>r.id!==id); save(); render(); }
function updEntry(rid,pid,f,v){ const rd=S.rounds.find(x=>x.id===rid); const e=rd.entries.find(x=>x.playerId===pid);
  if(!e)return; e[f]= v===""? "" : Number(v); save(); render(); }
function updGross(rid,pid,h,v){ const rd=S.rounds.find(x=>x.id===rid); const e=rd.entries.find(x=>x.playerId===pid);
  if(!e)return; if(!e.gross) e.gross=Array(18).fill(""); e.gross[h]= v===""?"":Number(v);
  // auto-sum stableford if all 18 present? leave points manual. just save.
  save(); render(); }
function toggleSkins(rid,pid,checked){ const rd=S.rounds.find(x=>x.id===rid); const e=rd&&rd.entries.find(x=>x.playerId===pid); if(!e)return; e.skinsIn=!!checked; save(); render(); }

function updSetting(k,v){
  if(["buyIn","skinsBuyIn","quotaCap","rollingWindow","seasonBuyIn","rakePct"].includes(k)) v=parseFloat(v)||0;
  S.settings[k]=v; save(); render();
}
function updSeasonPoints(v){
  const arr=v.split(",").map(x=>parseFloat(x.trim())).filter(x=>!isNaN(x));
  S.settings.seasonPoints=arr.length?arr:DEFAULT_SETTINGS.seasonPoints; save(); render();
}

/* ---------- data utilities ---------- */
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=(S.settings.leagueName||"dogfight").replace(/\s+/g,"_")+"_backup.json"; a.click();
}
function importData(input){
  const f=input.files[0]; if(!f)return; const r=new FileReader();
  r.onload=()=>{ try{ S=JSON.parse(r.result); S.settings={...DEFAULT_SETTINGS,...S.settings}; save(); render(); alert("Imported."); }
    catch(e){ alert("Could not read that file."); } };
  r.readAsText(f);
}

/* ============================ GHIN SYNC ============================ */
async function syncGhin(){
  const withGhin = S.players.filter(p=>p.ghin && String(p.ghin).trim());
  if(!withGhin.length){ alert("No players have a GHIN number yet. Add GHIN #s first."); return; }
  const btns=document.querySelectorAll(".syncbtn");
  btns.forEach(b=>{ b.disabled=true; b.textContent="Syncing…"; });
  try{
    const r=await fetch("/api/sync",{method:"POST"});
    const data=await r.json();
    if(!r.ok){ throw new Error(data.error||"Sync failed"); }
    // merge updated handicaps by ghin/id
    let changed=0;
    (data.updated||[]).forEach(u=>{
      const p=S.players.find(x=> (u.id&&x.id===u.id) || (u.ghin&&String(x.ghin)===String(u.ghin)));
      if(p && u.handicap!=null && p.handicap!==u.handicap){ p.handicap=u.handicap; changed++; }
      else if(p && u.handicap!=null){ p.handicap=u.handicap; }
    });
    save(); render();
    const errs=(data.errors||[]);
    alert(`GHIN sync complete.\nUpdated ${data.updated?data.updated.length:0} player(s)${changed?` (${changed} handicap change${changed>1?'s':''})`:''}.`+
      (errs.length?`\n\nCouldn't fetch: ${errs.map(e=>e.name||e.ghin).join(', ')}`:''));
  }catch(e){
    alert("GHIN sync failed: "+e.message+"\n\nMake sure GHIN_USERNAME and GHIN_PASSWORD are set in your Railway variables.");
  }finally{
    btns.forEach(b=>{ b.disabled=false; b.textContent="⟳ Sync from GHIN"; });
  }
}

init();
